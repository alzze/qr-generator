<!DOCTYPE html>
<html>
<head>
  <title>QR Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Courier; gap: 1rem;">
  
  <div id="qrcode"></div>
  <p id="wallet" style="margin-top: 9px; font-weight: 500;"></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    let data = params.get("data");
    let extractedWallet = null;

    if (data) {
      new QRCode(document.getElementById("qrcode"), data);

      if (data.startsWith("bitcoin:")) {
        extractedWallet = data.slice("bitcoin:".length).split('?')[0];
        document.getElementById("wallet").innerText = extractedWallet;
      }
    }
  </script>
</body>
</html>
